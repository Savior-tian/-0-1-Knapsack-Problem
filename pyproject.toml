[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = [".venv", ".ruff_cache"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "N",   # pep8-naming
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
